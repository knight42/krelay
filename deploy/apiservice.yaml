apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.relay.krelay.io
  labels:
    app.kubernetes.io/name: krelay
    app.kubernetes.io/component: server
spec:
  group: relay.krelay.io
  groupPriorityMinimum: 1000
  version: v1alpha1
  versionPriority: 100
  service:
    name: krelay-server
    namespace: krelay-system
    port: 443
  # Set to true if using self-signed certs without CA bundle
  insecureSkipTLSVerify: true
  # Alternatively, provide CA bundle:
  # caBundle: <base64-encoded-ca-cert>
