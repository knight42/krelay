apiVersion: apps/v1
kind: Deployment
metadata:
  name: krelay-server
  namespace: krelay-system
  labels:
    app.kubernetes.io/name: krelay
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: krelay
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: krelay
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: krelay-server
      containers:
        - name: krelay-server
          image: knight42/krelay-server:dev
          imagePullPolicy: Always
          args:
            - --addr=:8443
            - --tls-cert-file=/etc/krelay/tls/tls.crt
            - --tls-private-key-file=/etc/krelay/tls/tls.key
            - -v=2
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tls
              mountPath: /etc/krelay/tls
              readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: krelay-server-tls
